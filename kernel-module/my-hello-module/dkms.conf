#
# dkms.conf - DKMS configuration for my-hello-module
#
# DKMS (Dynamic Kernel Module Support) rebuilds this module automatically
# whenever a new kernel is installed, ensuring the module remains compatible.
#

PACKAGE_NAME="my-hello-module"
PACKAGE_VERSION="1.0.0"

MAKE[0]="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

BUILT_MODULE_NAME[0]="myhello"
BUILT_MODULE_LOCATION[0]="."

DEST_MODULE_LOCATION[0]="/extra"

AUTOINSTALL="yes"

REMAKE_INITRD="yes"